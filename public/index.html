<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Downloader</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>🎵 YouTube Downloader wincent</h1>

    <form id="downloadForm">
      <label for="path"
        >Lokasi Penyimpanan (kosongkan untuk folder default):</label
      >
      <input
        type="text"
        id="path"
        name="path"
        placeholder="C:/Users/YourName/Downloads" />

      <label for="url">Link YouTube:</label>
      <input
        type="url"
        id="url"
        name="url"
        placeholder="https://youtube.com/watch?v=xxxx"
        required />

      <label for="format">Pilih Format:</label>
      <select id="format" name="format">
        <option value="mp3">MP3 (Audio)</option>
        <option value="mp4">MP4 (Video)</option>
      </select>

      <button type="submit">Download</button>
    </form>

    <div id="status"></div>

    <script>
      document
        .getElementById("downloadForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const pathValue = document.getElementById("path").value;
          const urlValue = document.getElementById("url").value;
          const formatValue = document.getElementById("format").value;

          document.getElementById("status").innerText =
            "⏳ Sedang mendownload...";

          try {
            const res = await fetch("/download", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                path: pathValue,
                url: urlValue,
                format: formatValue,
              }),
            });

            const data = await res.json();
            if (data.success) {
              document.getElementById("status").innerText =
                "✅ Download selesai!";
            } else {
              document.getElementById("status").innerText =
                "❌ Gagal download: " + data.message;
            }
          } catch (err) {
            document.getElementById("status").innerText =
              "❌ Error: " + err.message;
          }
        });
    </script>
  </body>
</html>
