<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Downloader</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>YouTube <span>Downloader</span><br>by hazz</h1>

      <form id="downloadForm">
        <div class="form-group">
          <label>Lokasi Penyimpanan</label>
          <input
            type="text"
            id="path"
            placeholder= >
        </div>

        <div class="form-group">
          <label>Link YouTube:</label>
          <input type="url" id="url" placeholder="https://..." required />
        </div>

        <div class="form-group">
          <label>Format:</label>
          <select id="format">
            <option value="mp3">MP3 (Audio)</option>
            <option value="mp4">MP4 (Video)</option>
          </select>
        </div>

        <button type="submit" id="btnDownload">Download</button>
      </form>

      <div class="download-section">
        <div class="progress-container" id="progCont">
          <div class="progress-bar" id="progBar"></div>
        </div>
        <div class="status-meta">
          <div id="statusText">Siap...</div>
          <div class="percent-wrapper" id="percentText">0%</div>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const form = document.getElementById("downloadForm");
      const progBar = document.getElementById("progBar");
      const progCont = document.getElementById("progCont");
      const statusText = document.getElementById("statusText");
      const percentText = document.getElementById("percentText");
      const btn = document.getElementById("btnDownload");

      socket.on("downloadProgress", (data) => {
        progCont.style.display = "block";
        progBar.style.width = data.progress + "%";
        percentText.innerText = Math.round(data.progress) + "%";
        statusText.innerText = "⏳ Sedang mendownload...";
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault(); // Mencegah refresh halaman
        btn.disabled = true;
        statusText.innerText = "⏳ Memulai...";
        progBar.style.width = "0%";
        progCont.style.display = "none";

        try {
          const res = await fetch("/download", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              path: document.getElementById("path").value,
              url: document.getElementById("url").value,
              format: document.getElementById("format").value,
            }),
          });
          const data = await res.json();
          statusText.innerText = data.success
            ? "✅ Selesai!"
            : "❌ Gagal: " + data.message;
        } catch (err) {
          statusText.innerText = "❌ Error koneksi";
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
